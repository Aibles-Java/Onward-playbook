name: Deploy to GitHub Pages

on:
  # Chạy khi push vào nhánh main.
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions.
  workflow_dispatch:

# Quyền cần thiết để deploy lên GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy một lần deploy tại một thời điểm.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Disable Jekyll
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Backend GitHub Pages đôi khi trả "Deployment failed, try again later"
      # (lỗi chập chờn). Thử lần 1, nếu hỏng thì chờ rồi thử lại (fix flaky deploy).
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 15

      - name: Chờ trước khi thử lại
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (thử lại)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 15
